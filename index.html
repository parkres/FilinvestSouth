<!DOCTYPE html>

<head>

<body class="bg-[#fdfbf7] text-[#333] font-sans">

    <a href="https://www.facebook.com/profile.php?id=61556346275854" 
       target="_blank" 
       class="fb-float fixed bottom-6 right-6 z-[100] bg-[#1877F2] text-white w-14 h-14 rounded-full flex items-center justify-center shadow-2xl transition-all duration-300">
        <i class="fa-brands fa-facebook-f text-2xl"></i>
    </a>

    <nav class="bg-white shadow-sm border-b border-gray-100 sticky top-0 z-50">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center">
            <div class="text-2xl font-bold text-filinvest-green uppercase tracking-tighter">FILINVEST <span class="text-filinvest-gold">SOUTH</span></div>
            <a href="tel:+639212544429" class="bg-filinvest-green text-white px-5 py-2 rounded shadow-md hover:bg-opacity-90 transition flex items-center gap-2">
                <i class="fa-solid fa-phone-flip text-sm"></i>
                <span class="font-bold text-sm md:text-base">+63 921 254 4429</span>
            </a>
        </div>
    </nav>

    <section class="relative min-h-[650px] flex items-center justify-center overflow-hidden py-20">
        <div class="absolute inset-0 z-0">
            <img src="https://images.unsplash.com/photo-1512917774080-9991f1c4c750?auto=format&fit=crop&w=1920&q=80" 
                 class="w-full h-full object-cover" 
                 alt="Filinvest South Background">
            <div class="absolute inset-0 bg-black bg-opacity-50"></div>
        </div>

        <div class="container mx-auto px-6 relative z-10 text-center text-white">
            <h1 class="text-4xl md:text-5xl font-bold mb-6 drop-shadow-lg leading-tight">Your Dream Home Awaits in the South</h1>
            <p class="text-lg md:text-xl mb-10 max-w-2xl mx-auto drop-shadow-md text-gray-100 text-shadow">Find premium properties in Batangas, Laguna, and Cavite.</p>

            <div class="bg-white p-4 rounded-lg shadow-2xl flex flex-col md:flex-row gap-4 max-w-6xl mx-auto border-b-4 border-filinvest-gold">
                
                <div class="flex-1 text-left px-2">
                    <label class="block text-filinvest-green text-xs font-bold uppercase mb-2 italic">Select Province</label>
                    <select id="location-select" onchange="updateSubLocation()" class="w-full text-gray-700 p-2 border-b border-gray-200 focus:outline-none focus:border-filinvest-gold bg-transparent cursor-pointer font-semibold">
                        <option value="">Select Location</option>
                        <option value="batangas">Batangas</option>
                        <option value="laguna">Laguna</option>
                        <option value="cavite">Cavite</option>
                    </select>
                </div>

                <div id="sub-location-container" class="hidden flex-1 text-left px-2 border-l border-gray-100">
                    <label id="sub-location-label" class="block text-filinvest-green text-xs font-bold uppercase mb-2 italic">Select City/Town</label>
                    <select id="sub-location-select" class="w-full text-gray-700 p-2 border-b border-gray-200 focus:outline-none focus:border-filinvest-gold bg-transparent cursor-pointer font-semibold">
                        </select>
                </div>

                <div class="flex-1 text-left px-2 border-l border-gray-100">
                    <label class="block text-filinvest-green text-xs font-bold uppercase mb-2 italic">Property Type</label>
                    <select class="w-full text-gray-700 p-2 border-b border-gray-200 focus:outline-none focus:border-filinvest-gold bg-transparent cursor-pointer font-semibold">
                        <option value="">Select Type</option>
                        <option value="house-lot">House and Lot</option>
                        <option value="lot-only">Lot Only</option>
                    </select>
                </div>

                <div class="flex items-end">
                    <button class="w-full bg-filinvest-green text-white font-bold py-4 px-10 rounded hover:bg-opacity-90 transition uppercase tracking-widest text-sm shadow-lg">
                        Find Home
                    </button>
                </div>
            </div>
        </div>
    </section>

    <footer class="bg-[#1a1a1a] text-white py-12 border-t-4 border-[#b38e5d]">
        <div class="container mx-auto px-6 text-center">
            <h2 class="text-2xl font-bold tracking-widest uppercase mb-2">FILINVEST <span class="text-[#b38e5d]">LAND</span></h2>
            <p class="text-gray-400 text-sm mb-4 tracking-wide italic">This website is managed by <span class="text-white font-medium">Park Real Estate Services</span></p>
            <div class="mb-8 text-xl font-bold text-[#b38e5d]">+63 921 254 4429</div>
            <div class="flex justify-center space-x-6 text-gray-400 border-t border-gray-800 pt-8">
                <a href="https://www.facebook.com/profile.php?id=61556346275854" target="_blank" class="hover:text-[#b38e5d] transition"><i class="fa-brands fa-facebook-f text-2xl"></i></a>
                <a href="https://wa.me/639212544429" class="hover:text-[#b38e5d] transition"><i class="fa-brands fa-whatsapp text-2xl"></i></a>
            </div>
        </div>
    </footer>

    <script>
        function updateSubLocation() {
            const mainLocation = document.getElementById('location-select').value;
            const subContainer = document.getElementById('sub-location-container');
            const subSelect = document.getElementById('sub-location-select');
            const subLabel = document.getElementById('sub-location-label');

            // Reset sub-menu
            subSelect.innerHTML = '';
            
            let options = [];

            if (mainLocation === 'laguna') {
                subLabel.innerText = "City in Laguna";
                options = [
                    { value: 'calamba', text: 'Calamba' },
                    { value: 'san-pedro', text: 'San Pedro' }
                ];
            } else if (mainLocation === 'cavite') {
                subLabel.innerText = "City in Cavite";
                options = [
                    { value: 'tanza', text: 'Tanza' },
                    { value: 'trece-martires', text: 'Trece Martires' }
                ];
            }

            if (options.length > 0) {
                // Show the container and add options
                subContainer.classList.remove('hidden');
                
                // Add default "Choose" option
                let defaultOpt = document.createElement('option');
                defaultOpt.value = "";
                defaultOpt.text = "Choose City/Town";
                subSelect.appendChild(defaultOpt);

                options.forEach(opt => {
                    let el = document.createElement('option');
                    el.value = opt.value;
                    el.text = opt.text;
                    subSelect.appendChild(el);
                });
            } else {
                // Hide if no sub-locations (like for Batangas)
                subContainer.classList.add('hidden');
            }
        }
    </script>

</body>
</html>
