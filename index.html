<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filinvest South | Park Real Estate Services</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --filinvest-green: #004a26;
            --filinvest-gold: #b38e5d;
        }
        .text-filinvest-green { color: var(--filinvest-green); }
        .bg-filinvest-green { background-color: var(--filinvest-green); }
        .text-filinvest-gold { color: var(--filinvest-gold); }
        .border-filinvest-gold { border-color: var(--filinvest-gold); }
        
        /* Floating FB Button Hover */
        .fb-float:hover {
            transform: scale(1.1);
            background-color: #365899;
        }
    </style>
</head>
<body class="bg-[#fdfbf7] text-[#333] font-sans">

    <a href="https://www.facebook.com/profile.php?id=61556346275854" 
       target="_blank" 
       class="fb-float fixed bottom-6 right-6 z-[100] bg-[#1877F2] text-white w-14 h-14 rounded-full flex items-center justify-center shadow-2xl transition-all duration-300">
        <i class="fa-brands fa-facebook-f text-2xl"></i>
    </a>

    <nav class="bg-white shadow-sm border-b border-gray-100 sticky top-0 z-50">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center">
            <div class="text-2xl font-bold text-filinvest-green uppercase tracking-tighter">
                FILINVEST <span class="text-filinvest-gold">SOUTH</span>
            </div>
            
            <a href="tel:+639212544429" class="bg-filinvest-green text-white px-5 py-2 rounded shadow-md hover:bg-opacity-90 transition flex items-center gap-2">
                <i class="fa-solid fa-phone-flip text-sm"></i>
                <span class="font-bold text-sm md:text-base">+63 921 254 4429</span>
            </a>
        </div>
    </nav>

    <section class="relative min-h-[650px] flex items-center justify-center overflow-hidden py-20">
        <div class="absolute inset-0 z-0">
            <img src="https://lh3.googleusercontent.com/u/0/d/1hAyYQAhAuWwlTeDhTA2vumqp6G-xpkrl=w1920-h1080-iv1" 
                 class="w-full h-full object-cover" 
                 alt="Filinvest South Background">
            <div class="absolute inset-0 bg-black bg-opacity-40"></div>
        </div>

        <div class="container mx-auto px-6 relative z-10 text-center text-white">
            <h1 class="text-4xl md:text-6xl font-bold mb-6 drop-shadow-lg leading-tight">Build Your Future in the South</h1>
            <p class="text-lg md:text-xl mb-10 max-w-2xl mx-auto drop-shadow-md text-gray-100">
                Premium properties in Batangas, Laguna, and Cavite managed by Park Real Estate Services.
            </p>

            <div class="bg-white p-4 rounded-lg shadow-2xl flex flex-col md:flex-row gap-4 max-w-6xl mx-auto border-b-4 border-filinvest-gold">
                
                <div class="flex-1 text-left px-2">
                    <label class="block text-filinvest-green text-xs font-bold uppercase mb-2">Select Province</label>
                    <select id="location-select" onchange="updateSubLocation()" class="w-full text-gray-700 p-2 border-b border-gray-200 focus:outline-none focus:border-filinvest-gold bg-transparent font-semibold cursor-pointer">
                        <option value="">Select Location</option>
                        <option value="batangas">Batangas</option>
                        <option value="laguna">Laguna</option>
                        <option value="cavite">Cavite</option>
                    </select>
                </div>

                <div id="sub-location-container" class="hidden flex-1 text-left px-2 border-l border-gray-100">
                    <label id="sub-location-label" class="block text-filinvest-green text-xs font-bold uppercase mb-2">Select City/Town</label>
                    <select id="sub-location-select" class="w-full text-gray-700 p-2 border-b border-gray-200 focus:outline-none focus:border-filinvest-gold bg-transparent font-semibold cursor-pointer">
                        </select>
                </div>

                <div class="flex-1 text-left px-2 border-l border-gray-100">
                    <label class="block text-filinvest-green text-xs font-bold uppercase mb-2">Property Type</label>
                    <select id="property-type-select" class="w-full text-gray-700 p-2 border-b border-gray-200 focus:outline-none focus:border-filinvest-gold bg-transparent font-semibold cursor-pointer">
                        <option value
